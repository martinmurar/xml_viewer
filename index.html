<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBeam XML feed viewer</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<h1 style="text-align: center;">GymBeam XML feed viewer</h1>
<label id="drop-zone">
    Drop XML file here, or click to upload.
<input type="file" id="file-input" multiple accept=".xml, text/xml" hidden />
</label>

<div class="container" id="mainContent" style="display:none;">
    <h2>GymBeam Products</h2>
    
    <div class="filter-controls">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by name, brand or EAN...">
        </div>
        
        <div class="custom-dropdown" id="categoryContainer">
            <button class="dropdown-toggle" id="categoryDropdownToggle">
                <span class="toggle-text">All Categories</span>
                <span class="arrow">▼</span>
            </button>
            <div class="dropdown-menu" id="categoryDropdownMenu">
                <label class="dropdown-item">
                    <input type="checkbox" value="" id="allCategoriesCheckbox"> All Categories
                </label>
                </div>
        </div>
        
        <div class="custom-dropdown" id="stockContainer">
            <button class="dropdown-toggle" id="stockDropdownToggle">
                <span class="toggle-text">All Stock Status</span>
                <span class="arrow">▼</span>
            </button>
            <div class="dropdown-menu" id="stockDropdownMenu">
                <label class="dropdown-item">
                    <input type="radio" name="stockStatus" value="" id="allStockRadio" checked> All Statuses
                </label>
                <label class="dropdown-item">
                    <input type="radio" name="stockStatus" value="in-stock" id="inStockRadio"> In Stock
                </label>
                <label class="dropdown-item">
                    <input type="radio" name="stockStatus" value="out-of-stock" id="outOfStockRadio"> Out of Stock
                </label>
            </div>
        </div>
    </div>
    
    <div id="loadingStatus" class="status-msg">Loading data...</div>

    <div class="pagination-container" id="paginationControls"></div>

    <div class="table-wrapper">
        <table id="productTable">
            <thead>
                <tr>
                    <th>Photo</th>
                    <th class="sortable" data-sort="name">Name <span class="sort-indicator"></span></th>
                    <th>EAN</th>
                    <th>SKU</th>
                    <th class="sortable" data-sort="price">Price <span class="sort-indicator"></span></th>
                    <th class="sortable" data-sort="stock">Stock <span class="sort-indicator"></span></th>
                    <th class="sortable" data-sort="quantity">Qty <span class="sort-indicator"></span></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module" src="js/script.js"></script>

</body>
</html>
